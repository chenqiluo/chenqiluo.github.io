<style>
/* =============================================
   全局背景图片 - 用 ::before 伪元素固定在视口底层
   不受主题 --theme 变量或 background-color 影响
   ============================================= */

/* 禁用主题自带的背景色 */
:root {
    --theme: transparent !important;
}

html {
    background-image: url('/images/bg.jpg');
    background-size: cover;
    background-position: center center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    background-color: #d4cfc6;
    min-height: 100%;
}

body {
    background: transparent !important;
    background-color: transparent !important;
}

/* 让主内容区域保持透明，让背景图穿透显示 */
.main,
#top,
main,
.list,
.page,
.post-single,
.archive-posts {
    background: transparent !important;
    background-color: transparent !important;
}

/* 顶部导航栏半透明 */
header.header {
    background-color: rgba(255, 255, 255, 0.80) !important;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
}

/* 文章卡片和主内容块加半透明背景，保证可读性 */
.post-entry,
.first-entry,
.home-info,
.profile,
.page-header,
.post-header,
.post-content,
.toc,
.post-footer,
.pagination,
.terms-tags {
    background-color: rgba(255, 255, 255, 0.88) !important;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
}

/* 深色模式适配 */
[data-theme="dark"] header.header,
.dark header.header {
    background-color: rgba(20, 20, 20, 0.80) !important;
}

[data-theme="dark"] .post-entry,
[data-theme="dark"] .first-entry,
[data-theme="dark"] .home-info,
[data-theme="dark"] .profile,
[data-theme="dark"] .page-header,
[data-theme="dark"] .post-header,
[data-theme="dark"] .post-content,
[data-theme="dark"] .toc,
[data-theme="dark"] .post-footer,
[data-theme="dark"] .pagination,
[data-theme="dark"] .terms-tags,
.dark .post-entry,
.dark .first-entry,
.dark .home-info,
.dark .profile,
.dark .page-header,
.dark .post-header,
.dark .post-content,
.dark .toc,
.dark .post-footer,
.dark .pagination,
.dark .terms-tags {
    background-color: rgba(20, 20, 20, 0.85) !important;
}
</style>
