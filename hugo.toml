baseURL = "https://chenqiluo.github.io/"
languageCode = "zh-cn"
title = "luochenqi's Blog"
theme = "PaperMod"
defaultContentLanguage = "zh"
summaryLength = 50

[params]
  env = "production"
  title = "luochenqi's Blog"
  description = "记录日常、分享知识、沉淀思考"
  author = "luochenqi"
  defaultTheme = "auto"  # auto / light / dark
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  
  [params.homeInfoParams]
    Title = "👋 你好，我是 luochenqi"
    Content = "这里记录我的每日目标、学习笔记和知识积累。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/chenqiluo"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "daily"
    name = "每日目标"
    url = "/daily/"
    weight = 20
  [[menu.main]]
    identifier = "wiki"
    name = "知识库"
    url = "/wiki/"
    weight = 30
  [[menu.main]]
    identifier = "stock"
    name = "股票分析"
    url = "/stock/"
    weight = 35
  [[menu.main]]
    identifier = "ai-leaderboard"
    name = "AI天梯榜"
    url = "/ai-leaderboard/"
    weight = 38
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 40
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 50

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
